[build]
command = "npm install"
functions = "functions"
publish = "public"

[dev]
command = "npm run dev"
port = 3000

[[redirects]]
from = "/api/clientes"
to = "/.netlify/functions/clientes"
status = 200

[[redirects]]
from = "/api/clientes/*"
to = "/.netlify/functions/clientes"
status = 200

[[redirects]]
from = "/api/equipos"
to = "/.netlify/functions/equipos"
status = 200

[[redirects]]
from = "/api/equipos/*"
to = "/.netlify/functions/equipos"
status = 200

[[redirects]]
from = "/api/servicios"
to = "/.netlify/functions/servicios"
status = 200

[[redirects]]
from = "/api/servicios/*"
to = "/.netlify/functions/servicios"
status = 200

[[redirects]]
from = "/api/servicio-equipo"
to = "/.netlify/functions/servicio-equipo"
status = 200

[[redirects]]
from = "/api/servicio-equipo/*"
to = "/.netlify/functions/servicio-equipo"
status = 200

[[redirects]]
from = "/api/decolecta"
to = "/.netlify/functions/decolecta"
status = 200

[[redirects]]
from = "/api/decolecta/*"
to = "/.netlify/functions/decolecta"
status = 200

[[redirects]]
from = "/api/auth/*"
to = "/.netlify/functions/auth"
status = 200

[[redirects]]
from = "/api/usuarios"
to = "/.netlify/functions/usuarios"
status = 200

[[redirects]]
from = "/api/usuarios/*"
to = "/.netlify/functions/usuarios"
status = 200

[[redirects]]
from = "/api/enviar-whatsapp-pdf"
to = "/.netlify/functions/enviar-whatsapp-pdf"
status = 200

[[redirects]]
from = "/api/generar-pdf"
to = "/.netlify/functions/generar-pdf"
status = 200

[context.production.environment]
NODE_ENV = "production"
