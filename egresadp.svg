<svg id="integraciones_doctorpc" xmlns="http://www.w3.org/2000/svg" width="800" height="500" font-family="Arial">

<!-- Contenedor principal -->
<rect x="20" y="20" width="760" height="460" fill="#F5F5F5" stroke="#000000" stroke-width="2"/>
<text x="400" y="50" text-anchor="middle" font-size="18" font-weight="bold">DOCTORPC SYSTEM - Integraciones</text>

<!-- Frontend -->
<rect x="100" y="100" width="150" height="80" rx="10" ry="10" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
<text x="175" y="125" text-anchor="middle" font-size="14" font-weight="bold">Frontend</text>
<text x="175" y="145" text-anchor="middle" font-size="12">(HTML / CSS / JS)</text>

<!-- Backend -->
<rect x="400" y="100" width="150" height="80" rx="10" ry="10" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
<text x="475" y="125" text-anchor="middle" font-size="14" font-weight="bold">Backend</text>
<text x="475" y="145" text-anchor="middle" font-size="12">(Express.js)</text>

<!-- Flechas Frontend ↔ Backend -->
<line x1="250" y1="140" x2="400" y2="140" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="120" x2="250" y2="120" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

<!-- MongoDB -->
<rect x="400" y="220" width="150" height="80" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
<text x="475" y="250" text-anchor="middle" font-size="14" font-weight="bold">MongoDB</text>
<text x="475" y="270" text-anchor="middle" font-size="12">(Database)</text>

<!-- Flecha Backend → MongoDB -->
<line x1="475" y1="180" x2="475" y2="220" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

<!-- RENIEC API -->
<rect x="400" y="340" width="150" height="80" rx="10" ry="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2"/>
<text x="475" y="370" text-anchor="middle" font-size="14" font-weight="bold">RENIEC API</text>
<text x="475" y="390" text-anchor="middle" font-size="12">(Validación DNI)</text>

<!-- Flecha Backend → RENIEC API -->
<line x1="475" y1="300" x2="475" y2="340" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Definición marcador de flecha -->
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="black"/>
  </marker>
</defs>

</svg>