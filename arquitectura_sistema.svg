<svg width="900" height="650" xmlns="http://www.w3.org/2000/svg" font-family="Arial">

<!-- Cliente -->
<rect x="150" y="20" width="600" height="90" rx="10" ry="10" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
<text x="450" y="45" text-anchor="middle" font-size="16" font-weight="bold">CLIENTE (Navegador)</text>
<text x="450" y="70" text-anchor="middle" font-size="14">HTML / CSS / JavaScript Frontend</text>

<!-- Flecha -->
<line x1="450" y1="110" x2="450" y2="150" stroke="black" stroke-width="2"/>
<text x="460" y="135" font-size="12">HTTP / REST</text>

<!-- Servidor -->
<rect x="150" y="150" width="600" height="120" rx="10" ry="10" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
<text x="450" y="180" text-anchor="middle" font-size="16" font-weight="bold">SERVIDOR (Node.js + Express)</text>
<text x="450" y="205" text-anchor="middle" font-size="14">API REST (GET, POST, PUT, DELETE)</text>
<text x="450" y="225" text-anchor="middle" font-size="14">Rutas y Controladores</text>

<!-- Flecha -->
<line x1="450" y1="270" x2="450" y2="310" stroke="black" stroke-width="2"/>
<text x="460" y="295" font-size="12">Query / Insert / Update</text>

<!-- Base de datos -->
<rect x="150" y="310" width="600" height="140" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
<text x="450" y="340" text-anchor="middle" font-size="16" font-weight="bold">BASE DE DATOS (MongoDB)</text>
<text x="450" y="370" text-anchor="middle" font-size="14">Colección: Clientes</text>
<text x="450" y="395" text-anchor="middle" font-size="14">Colección: Equipos</text>
<text x="450" y="420" text-anchor="middle" font-size="14">Colección: Reparaciones</text>

<!-- Flecha lateral -->
<line x1="750" y1="200" x2="850" y2="200" stroke="black" stroke-width="2"/>
<line x1="850" y1="200" x2="850" y2="480" stroke="black" stroke-width="2"/>
<line x1="850" y1="480" x2="750" y2="480" stroke="black" stroke-width="2"/>
<text x="860" y="340" transform="rotate(90 860,340)" font-size="12">API Call</text>

<!-- Servicios externos -->
<rect x="150" y="470" width="600" height="100" rx="10" ry="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2"/>
<text x="450" y="500" text-anchor="middle" font-size="16" font-weight="bold">SERVICIOS EXTERNOS (RENIEC API)</text>
<text x="450" y="530" text-anchor="middle" font-size="14">Validación de DNI</text>

</svg>