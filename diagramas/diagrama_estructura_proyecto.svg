    Tecnologías Utilizadas
  </text>

  <text x="620" y="575" font-size="11" fill="#333">• Node.js v18.x + Express.js</text>
  <text x="620" y="595" font-size="11" fill="#333">• MongoDB (Base de datos)</text>
  <text x="620" y="615" font-size="11" fill="#333">• WhatsApp Cloud API (Meta)</text>
  <text x="620" y="635" font-size="11" fill="#333">• jsPDF (Generación de PDF)</text>
  <text x="620" y="655" font-size="11" fill="#333">• Axios (Peticiones HTTP)</text>
  <text x="620" y="675" font-size="11" fill="#333">• Netlify Functions (Serverless)</text>

