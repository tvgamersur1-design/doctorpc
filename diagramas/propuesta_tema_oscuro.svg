<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <!-- Gradientes para modo claro -->
    <linearGradient id="fondoClaro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#c3cfe2"/>
    </linearGradient>
    
    <linearGradient id="sidebarClaro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2192B8"/>
      <stop offset="100%" style="stop-color:#1976a2"/>
    </linearGradient>
    
    <!-- Gradientes para modo oscuro -->
    <linearGradient id="fondoOscuro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e"/>
      <stop offset="100%" style="stop-color:#2d3250"/>
    </linearGradient>
    
    <linearGradient id="sidebarOscuro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a3a"/>
      <stop offset="100%" style="stop-color:#0f1419"/>
    </linearGradient>
  </defs>
  
  <!-- Título principal -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    🌙 Propuesta Tema Oscuro - Doctor PC
  </text>
  
  <text x="700" y="70" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle">
    Solo se modifican: Header, Sidebar y Fondo | El contenido se mantiene claro
  </text>
  
  <!-- ============ MODO CLARO (IZQUIERDA) ============ -->
  <g id="modoClaro">
    <!-- Título -->
    <text x="350" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2192B8" text-anchor="middle">
      ☀️ MODO CLARO (Actual)
    </text>
    
    <!-- Fondo -->
    <rect x="50" y="140" width="600" height="700" fill="url(#fondoClaro)" rx="10"/>
    
    <!-- Sidebar -->
    <rect x="50" y="140" width="180" height="700" fill="url(#sidebarClaro)" rx="10"/>
    
    <!-- Logo en sidebar -->
    <rect x="70" y="160" width="140" height="50" fill="rgba(255,255,255,0.2)" rx="5"/>
    <text x="140" y="192" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">
      LOGO
    </text>
    
    <!-- Botones sidebar -->
    <rect x="70" y="230" width="140" height="40" fill="rgba(255,255,255,0.08)" rx="5"/>
    <text x="80" y="255" font-family="Arial, sans-serif" font-size="12" fill="white">
      👥 Clientes
    </text>
    
    <rect x="70" y="280" width="140" height="40" fill="white" rx="5"/>
    <text x="80" y="305" font-family="Arial, sans-serif" font-size="12" fill="#2192B8" font-weight="bold">
      🔧 Servicios
    </text>
    
    <rect x="70" y="330" width="140" height="40" fill="rgba(255,255,255,0.08)" rx="5"/>
    <text x="80" y="355" font-family="Arial, sans-serif" font-size="12" fill="white">
      💻 Equipos
    </text>
    
    <rect x="70" y="380" width="140" height="40" fill="rgba(255,255,255,0.08)" rx="5"/>
    <text x="80" y="405" font-family="Arial, sans-serif" font-size="12" fill="white">
      💰 Pagos
    </text>
    
    <!-- Header -->
    <rect x="230" y="140" width="420" height="70" fill="#1b7fb8" rx="10"/>
    <text x="440" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
      Doctor PC - Sistema de Administración
    </text>
    <text x="440" y="190" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">
      Gestiona clientes, servicios y equipos
    </text>
    
    <!-- Botón tema -->
    <circle cx="600" cy="175" r="18" fill="rgba(255,255,255,0.15)"/>
    <text x="600" y="182" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">🌙</text>
    
    <!-- Contenido (tabla clara) -->
    <rect x="250" y="230" width="380" height="590" fill="white" rx="8" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Título sección -->
    <text x="260" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2192B8">
      Gestión de Servicios
    </text>
    <line x1="260" y1="270" x2="620" y2="270" stroke="#2192B8" stroke-width="2"/>
    
    <!-- Tabla -->
    <rect x="260" y="290" width="360" height="40" fill="#2192B8" rx="5"/>
    <text x="270" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      N° Servicio
    </text>
    <text x="370" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      Cliente
    </text>
    <text x="500" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      Estado
    </text>
    
    <!-- Filas tabla -->
    <rect x="260" y="330" width="360" height="35" fill="white" stroke="#f0f0f0" stroke-width="1"/>
    <text x="270" y="352" font-family="Arial, sans-serif" font-size="11" fill="#333">001</text>
    <text x="370" y="352" font-family="Arial, sans-serif" font-size="11" fill="#333">Juan Pérez</text>
    <rect x="500" y="340" width="70" height="20" fill="#4CAF50" rx="3"/>
    <text x="535" y="354" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Activo</text>
    
    <rect x="260" y="365" width="360" height="35" fill="#f9f9f9" stroke="#f0f0f0" stroke-width="1"/>
    <text x="270" y="387" font-family="Arial, sans-serif" font-size="11" fill="#333">002</text>
    <text x="370" y="387" font-family="Arial, sans-serif" font-size="11" fill="#333">María López</text>
    <rect x="500" y="375" width="70" height="20" fill="#FF9800" rx="3"/>
    <text x="535" y="389" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Proceso</text>
    
    <!-- Etiquetas de colores -->
    <text x="260" y="450" font-family="Arial, sans-serif" font-size="11" fill="#666" font-weight="bold">
      Colores actuales:
    </text>
    <rect x="260" y="460" width="100" height="25" fill="#1b7fb8" rx="3"/>
    <text x="310" y="478" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Header</text>
    
    <rect x="370" y="460" width="100" height="25" fill="#2192B8" rx="3"/>
    <text x="420" y="478" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Sidebar</text>
    
    <rect x="480" y="460" width="140" height="25" fill="url(#fondoClaro)" rx="3" stroke="#ccc" stroke-width="1"/>
    <text x="550" y="478" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Fondo</text>
  </g>
  
  <!-- ============ MODO OSCURO (DERECHA) ============ -->
  <g id="modoOscuro">
    <!-- Título -->
    <text x="1050" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3bb4e5" text-anchor="middle">
      🌙 MODO OSCURO (Propuesto)
    </text>
    
    <!-- Fondo -->
    <rect x="750" y="140" width="600" height="700" fill="url(#fondoOscuro)" rx="10"/>
    
    <!-- Sidebar -->
    <rect x="750" y="140" width="180" height="700" fill="url(#sidebarOscuro)" rx="10"/>
    
    <!-- Logo en sidebar -->
    <rect x="770" y="160" width="140" height="50" fill="rgba(255,255,255,0.1)" rx="5"/>
    <text x="840" y="192" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">
      LOGO
    </text>
    
    <!-- Botones sidebar oscuro -->
    <rect x="770" y="230" width="140" height="40" fill="rgba(255,255,255,0.05)" rx="5"/>
    <text x="780" y="255" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      👥 Clientes
    </text>
    
    <rect x="770" y="280" width="140" height="40" fill="white" rx="5"/>
    <text x="780" y="305" font-family="Arial, sans-serif" font-size="12" fill="#0d1b2a" font-weight="bold">
      🔧 Servicios
    </text>
    
    <rect x="770" y="330" width="140" height="40" fill="rgba(255,255,255,0.05)" rx="5"/>
    <text x="780" y="355" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      💻 Equipos
    </text>
    
    <rect x="770" y="380" width="140" height="40" fill="rgba(255,255,255,0.05)" rx="5"/>
    <text x="780" y="405" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      💰 Pagos
    </text>
    
    <!-- Header oscuro -->
    <rect x="930" y="140" width="420" height="70" fill="#0d1b2a" rx="10"/>
    <text x="1140" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
      Doctor PC - Sistema de Administración
    </text>
    <text x="1140" y="190" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">
      Gestiona clientes, servicios y equipos
    </text>
    
    <!-- Botón tema -->
    <circle cx="1300" cy="175" r="18" fill="rgba(255,255,255,0.08)"/>
    <text x="1300" y="182" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">☀️</text>
    
    <!-- Contenido (tabla CLARA sobre fondo oscuro) -->
    <rect x="950" y="230" width="380" height="590" fill="white" rx="8" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Título sección -->
    <text x="960" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2192B8">
      Gestión de Servicios
    </text>
    <line x1="960" y1="270" x2="1320" y2="270" stroke="#2192B8" stroke-width="2"/>
    
    <!-- Tabla -->
    <rect x="960" y="290" width="360" height="40" fill="#2192B8" rx="5"/>
    <text x="970" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      N° Servicio
    </text>
    <text x="1070" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      Cliente
    </text>
    <text x="1200" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      Estado
    </text>
    
    <!-- Filas tabla -->
    <rect x="960" y="330" width="360" height="35" fill="white" stroke="#f0f0f0" stroke-width="1"/>
    <text x="970" y="352" font-family="Arial, sans-serif" font-size="11" fill="#333">001</text>
    <text x="1070" y="352" font-family="Arial, sans-serif" font-size="11" fill="#333">Juan Pérez</text>
    <rect x="1200" y="340" width="70" height="20" fill="#4CAF50" rx="3"/>
    <text x="1235" y="354" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Activo</text>
    
    <rect x="960" y="365" width="360" height="35" fill="#f9f9f9" stroke="#f0f0f0" stroke-width="1"/>
    <text x="970" y="387" font-family="Arial, sans-serif" font-size="11" fill="#333">002</text>
    <text x="1070" y="387" font-family="Arial, sans-serif" font-size="11" fill="#333">María López</text>
    <rect x="1200" y="375" width="70" height="20" fill="#FF9800" rx="3"/>
    <text x="1235" y="389" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Proceso</text>
    
    <!-- Etiquetas de colores nuevos -->
    <text x="960" y="450" font-family="Arial, sans-serif" font-size="11" fill="#666" font-weight="bold">
      Nuevos colores:
    </text>
    <rect x="960" y="460" width="100" height="25" fill="#0d1b2a" rx="3"/>
    <text x="1010" y="478" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Header</text>
    
    <rect x="1070" y="460" width="100" height="25" fill="#1e2a3a" rx="3"/>
    <text x="1120" y="478" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Sidebar</text>
    
    <rect x="1180" y="460" width="140" height="25" fill="url(#fondoOscuro)" rx="3" stroke="#555" stroke-width="1"/>
    <text x="1250" y="478" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Fondo</text>
    
    <!-- Nota importante -->
    <rect x="960" y="510" width="360" height="80" fill="#e8f5e9" rx="5" stroke="#4CAF50" stroke-width="2"/>
    <text x="1140" y="535" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">
      ✅ CONTENIDO SE MANTIENE CLARO
    </text>
    <text x="1140" y="555" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">
      Las tablas, formularios y modales
    </text>
    <text x="1140" y="572" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">
      conservan su fondo blanco para
    </text>
    <text x="1140" y="589" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">
      mejor legibilidad
    </text>
  </g>
  
  <!-- Flecha de comparación -->
  <path d="M 680 480 L 720 480" stroke="#3bb4e5" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3bb4e5"/>
    </marker>
  </defs>
  
  <text x="700" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3bb4e5" text-anchor="middle">
    CAMBIO
  </text>
  
  <!-- Ventajas -->
  <rect x="50" y="860" width="1300" height="30" fill="#e3f2fd" rx="5"/>
  <text x="700" y="882" font-family="Arial, sans-serif" font-size="13" fill="#1976D2" text-anchor="middle" font-weight="bold">
    ✨ Ventajas: Menos fatiga visual • Contraste perfecto • Profesional • Contenido legible • Fácil de implementar
  </text>
</svg>