<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 1080">
  <defs>
    <!-- Gradientes con los colores originales -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(33, 146, 184);stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976a2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgb(33, 146, 184);stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976a2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombras -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo principal con gradiente turquesa -->
  <rect width="320" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Línea de acento lateral -->
  <rect x="0" y="0" width="4" height="1080" fill="#1565a0"/>
  
  <!-- Patrón decorativo sutil -->
  <g opacity="0.05">
    <circle cx="280" cy="100" r="80" fill="#ffffff"/>
    <circle cx="40" cy="500" r="60" fill="#ffffff"/>
    <circle cx="290" cy="800" r="70" fill="#ffffff"/>
  </g>
  
  <!-- Header Section -->
  <g id="header">
    <!-- Contenedor del logo -->
    <rect x="20" y="30" width="280" height="150" rx="12" fill="#ffffff" opacity="0.1"/>
    
    <!-- Logo placeholder (círculo) -->
    <circle cx="160" cy="85" r="38" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="160" cy="85" r="35" fill="rgb(33, 146, 184)"/>
    
    <!-- Icono Doctor PC simplificado -->
    <g transform="translate(145, 70)">
      <circle cx="15" cy="15" r="12" fill="#ffffff"/>
      <path d="M15 10 L15 20 M10 15 L20 15" stroke="rgb(33, 146, 184)" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    
    <!-- Nombre de la empresa -->
    <text x="160" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="700" 
          fill="#ffffff" text-anchor="middle" letter-spacing="0.5">doctor pc</text>
    <text x="160" y="165" font-family="Arial, sans-serif" font-size="11" 
          fill="#b3e5ec" text-anchor="middle" letter-spacing="1">SOLUCIONES INFORMÁTICAS</text>
  </g>
  
  <!-- Separador elegante -->
  <line x1="40" y1="210" x2="280" y2="210" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="40" y1="212" x2="280" y2="212" stroke="#0d5a66" stroke-width="1" opacity="0.3"/>
  
  <!-- Navigation Section -->
  <g id="navigation">
    <!-- Título de sección -->
    <text x="30" y="245" font-family="Arial, sans-serif" font-size="10" font-weight="700" 
          fill="#b3e5ec" letter-spacing="1.5">MENÚ PRINCIPAL</text>
    
    <!-- Item 1: Clientes (Activo) -->
    <g id="nav-clientes">
      <rect x="20" y="260" width="280" height="54" rx="10" fill="#ffffff" filter="url(#shadow)"/>
      <rect x="24" y="264" width="4" height="46" rx="2" fill="rgb(33, 146, 184)"/>
      
      <!-- Icono -->
      <g transform="translate(45, 278)">
        <circle cx="8" cy="8" r="7" fill="none" stroke="rgb(33, 146, 184)" stroke-width="2"/>
        <path d="M8 8 L8 4 M8 8 L11 11 M8 8 L5 11" stroke="rgb(33, 146, 184)" stroke-width="2" 
              stroke-linecap="round" fill="none"/>
      </g>
      
      <text x="75" y="292" font-family="Arial, sans-serif" font-size="15" font-weight="600" 
            fill="rgb(33, 146, 184)">Clientes</text>
      
      <!-- Badge de notificación -->
      <circle cx="265" cy="287" r="11" fill="#e74c3c"/>
      <text x="265" y="291" font-family="Arial, sans-serif" font-size="11" font-weight="bold" 
            fill="#ffffff" text-anchor="middle">3</text>
    </g>
    
    <!-- Item 2: Servicios -->
    <g id="nav-servicios">
      <rect x="20" y="325" width="280" height="54" rx="10" fill="#ffffff" opacity="0.15"/>
      
      <!-- Icono -->
      <g transform="translate(45, 343)">
        <rect x="2" y="2" width="12" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M5 7 L11 7 M8 4 L8 10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </g>
      
      <text x="75" y="357" font-family="Arial, sans-serif" font-size="15" font-weight="500" 
            fill="#ffffff">Servicios</text>
      
      <!-- Flecha indicadora -->
      <path d="M265 352 L270 357 L265 362" fill="none" stroke="#ffffff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    
    <!-- Item 3: Equipos -->
    <g id="nav-equipos">
      <rect x="20" y="390" width="280" height="54" rx="10" fill="#ffffff" opacity="0.15"/>
      
      <!-- Icono -->
      <g transform="translate(45, 408)">
        <rect x="1" y="3" width="14" height="10" rx="1" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="5" y="13" width="6" height="1" fill="#ffffff"/>
        <line x1="8" y1="14" x2="8" y2="15" stroke="#ffffff" stroke-width="2"/>
      </g>
      
      <text x="75" y="422" font-family="Arial, sans-serif" font-size="15" font-weight="500" 
            fill="#ffffff">Equipos</text>
      
      <path d="M265 417 L270 422 L265 427" fill="none" stroke="#ffffff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    
    <!-- Item 4: Gestión de Pagos -->
    <g id="nav-pagos">
      <rect x="20" y="455" width="280" height="54" rx="10" fill="#ffffff" opacity="0.15"/>
      
      <!-- Icono -->
      <g transform="translate(45, 473)">
        <rect x="2" y="4" width="12" height="9" rx="1" fill="none" stroke="#ffffff" stroke-width="2"/>
        <line x1="2" y1="7" x2="14" y2="7" stroke="#ffffff" stroke-width="2"/>
        <circle cx="8" cy="10" r="1.5" fill="#ffffff"/>
      </g>
      
      <text x="75" y="487" font-family="Arial, sans-serif" font-size="15" font-weight="500" 
            fill="#ffffff">Gestión de Pagos</text>
      
      <path d="M265 482 L270 487 L265 492" fill="none" stroke="#ffffff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    
    <!-- Separador de sección -->
    <line x1="40" y1="540" x2="280" y2="540" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    
    <!-- Título de sección secundaria -->
    <text x="30" y="575" font-family="Arial, sans-serif" font-size="10" font-weight="700" 
          fill="#b3e5ec" letter-spacing="1.5">ADMINISTRACIÓN</text>
    
    <!-- Item 5: Usuarios -->
    <g id="nav-usuarios">
      <rect x="20" y="590" width="280" height="54" rx="10" fill="#ffffff" opacity="0.15"/>
      
      <!-- Icono -->
      <g transform="translate(45, 608)">
        <circle cx="8" cy="5" r="3" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M2 13 Q2 9 8 9 Q14 9 14 13" fill="none" stroke="#ffffff" stroke-width="2" 
              stroke-linecap="round"/>
      </g>
      
      <text x="75" y="622" font-family="Arial, sans-serif" font-size="15" font-weight="500" 
            fill="#ffffff">Usuarios</text>
      
      <path d="M265 617 L270 622 L265 627" fill="none" stroke="#ffffff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    
    <!-- Item 6: Reportes -->
    <g id="nav-reportes">
      <rect x="20" y="655" width="280" height="54" rx="10" fill="#ffffff" opacity="0.15"/>
      
      <!-- Icono -->
      <g transform="translate(45, 673)">
        <rect x="3" y="2" width="10" height="13" rx="1" fill="none" stroke="#ffffff" stroke-width="2"/>
        <line x1="5" y1="5" x2="11" y2="5" stroke="#ffffff" stroke-width="1.5"/>
        <line x1="5" y1="8" x2="11" y2="8" stroke="#ffffff" stroke-width="1.5"/>
        <line x1="5" y1="11" x2="9" y2="11" stroke="#ffffff" stroke-width="1.5"/>
      </g>
      
      <text x="75" y="687" font-family="Arial, sans-serif" font-size="15" font-weight="500" 
            fill="#ffffff">Reportes</text>
      
      <path d="M265 682 L270 687 L265 692" fill="none" stroke="#ffffff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    
    <!-- Item 7: Configuración -->
    <g id="nav-config">
      <rect x="20" y="720" width="280" height="54" rx="10" fill="#ffffff" opacity="0.15"/>
      
      <!-- Icono -->
      <g transform="translate(45, 738)">
        <circle cx="8" cy="8" r="3" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M8 1 L8 3 M8 13 L8 15 M15 8 L13 8 M3 8 L1 8 M12.5 3.5 L11 5 M5 11 L3.5 12.5 
                 M12.5 12.5 L11 11 M5 5 L3.5 3.5" 
              stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      
      <text x="75" y="752" font-family="Arial, sans-serif" font-size="15" font-weight="500" 
            fill="#ffffff">Configuración</text>
      
      <path d="M265 747 L270 752 L265 757" fill="none" stroke="#ffffff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Footer Section -->
  <g id="footer">
    <!-- Separador -->
    <line x1="40" y1="950" x2="280" y2="950" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    
    <!-- Botón de cerrar sesión -->
    <g id="logout-button">
      <rect x="20" y="980" width="280" height="48" rx="10" 
            fill="rgba(255, 255, 255, 0.1)" 
            stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
      
      <!-- Icono de salida -->
      <g transform="translate(115, 996)">
        <path d="M1 8 L8 8 M6 5 L9 8 L6 11" stroke="#ff6b6b" stroke-width="2" 
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M4 1 L1 1 L1 15 L4 15" stroke="#ff6b6b" stroke-width="2" 
              stroke-linecap="round" fill="none"/>
      </g>
      
      <text x="160" y="1009" font-family="Arial, sans-serif" font-size="15" font-weight="600" 
            fill="#ffffff" text-anchor="middle">Cerrar Sesión</text>
    </g>
  </g>
  
  <!-- Elementos decorativos sutiles -->
  <circle cx="305" cy="25" r="3" fill="#ffffff" opacity="0.1"/>
  <circle cx="295" cy="45" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="310" cy="55" r="1.5" fill="#ffffff" opacity="0.06"/>
  
</svg>