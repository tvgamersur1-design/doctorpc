<svg width="800" height="700" xmlns="http://www.w3.org/2000/svg" font-family="Arial">

<!-- Contenedor principal -->
<rect x="20" y="20" width="760" height="660" fill="#F5F5F5" stroke="#000000" stroke-width="2"/>

<!-- Header -->
<rect x="20" y="20" width="760" height="60" fill="#E0E0E0" stroke="#000000" stroke-width="1"/>
<text x="50" y="55" font-size="14" font-weight="bold">LOGO</text>
<text x="150" y="55" font-size="14">Inicio</text>
<text x="220" y="55" font-size="14">Clientes</text>
<text x="300" y="55" font-size="14">Equipos</text>
<text x="380" y="55" font-size="14">Reniec</text>

<!-- Tabs container -->
<rect x="50" y="100" width="700" height="500" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
<text x="60" y="120" font-size="14" font-weight="bold">TAB: CLIENTES | EQUIPOS | RENIEC</text>

<!-- Formulario -->
<rect x="60" y="140" width="680" height="150" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
<text x="70" y="165" font-size="13">FORMULARIO:</text>
<text x="80" y="190" font-size="12">Nombre: ____________________</text>
<text x="80" y="215" font-size="12">Teléfono: __________________</text>
<text x="80" y="240" font-size="12">Email: _____________________</text>
<rect x="80" y="260" width="80" height="25" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
<text x="120" y="278" font-size="12" text-anchor="middle">Guardar</text>
<rect x="180" y="260" width="80" height="25" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="220" y="278" font-size="12" text-anchor="middle">Limpiar</text>

<!-- Tabla de datos -->
<rect x="60" y="310" width="680" height="220" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
<text x="70" y="335" font-size="13">TABLA DE DATOS:</text>
<text x="80" y="360" font-size="12">Nombre | Teléfono | Acciones</text>
<text x="80" y="380" font-size="12">Juan   | 987654321 | Editar eliminar</text>
<text x="80" y="400" font-size="12">María  | 987654322 | Editar eliminar </text>

</svg>