<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: bold 22px sans-serif; fill: #202124; }
      .subtitle { font: bold 16px sans-serif; fill: #2192B8; }
      .text { font: 14px sans-serif; fill: #5f6368; }
      .small-text { font: 12px sans-serif; fill: #80868b; }
      .code { font: 12px monospace; fill: #2196F3; }
    </style>
  </defs>
  
  <!-- Título -->
  <text x="600" y="40" class="title" text-anchor="middle">Debounce en Búsqueda de Pagos</text>
  
  <!-- SIN DEBOUNCE -->
  <text x="300" y="80" class="subtitle" text-anchor="middle">❌ Sin Debounce (Antes)</text>
  
  <rect x="50" y="100" width="500" height="250" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="8"/>
  
  <text x="300" y="130" class="text" text-anchor="middle" font-weight="600">Usuario escribe: "JESUS"</text>
  
  <!-- Timeline sin debounce -->
  <line x1="80" y1="160" x2="520" y2="160" stroke="#e0e0e0" stroke-width="2"/>
  
  <circle cx="100" cy="160" r="8" fill="#f44336"/>
  <text x="100" y="185" class="small-text" text-anchor="middle">J</text>
  <text x="100" y="200" class="small-text" text-anchor="middle" fill="#f44336">Busca</text>
  
  <circle cx="180" cy="160" r="8" fill="#f44336"/>
  <text x="180" y="185" class="small-text" text-anchor="middle">E</text>
  <text x="180" y="200" class="small-text" text-anchor="middle" fill="#f44336">Busca</text>
  
  <circle cx="260" cy="160" r="8" fill="#f44336"/>
  <text x="260" y="185" class="small-text" text-anchor="middle">S</text>
  <text x="260" y="200" class="small-text" text-anchor="middle" fill="#f44336">Busca</text>
  
  <circle cx="340" cy="160" r="8" fill="#f44336"/>
  <text x="340" y="185" class="small-text" text-anchor="middle">U</text>
  <text x="340" y="200" class="small-text" text-anchor="middle" fill="#f44336">Busca</text>
  
  <circle cx="420" cy="160" r="8" fill="#f44336"/>
  <text x="420" y="185" class="small-text" text-anchor="middle">S</text>
  <text x="420" y="200" class="small-text" text-anchor="middle" fill="#f44336">Busca</text>
  
  <text x="300" y="240" class="text" text-anchor="middle" font-weight="600" fill="#f44336">Problema:</text>
  <text x="300" y="265" class="small-text" text-anchor="middle">5 búsquedas innecesarias</text>
  <text x="300" y="285" class="small-text" text-anchor="middle">Renderiza la tabla 5 veces</text>
  <text x="300" y="305" class="small-text" text-anchor="middle">Consume recursos del navegador</text>
  <text x="300" y="325" class="small-text" text-anchor="middle">Puede causar lag en la interfaz</text>
  
  <!-- CON DEBOUNCE -->
  <text x="900" y="80" class="subtitle" text-anchor="middle">✅ Con Debounce (Ahora)</text>
  
  <rect x="650" y="100" width="500" height="250" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="8"/>
  
  <text x="900" y="130" class="text" text-anchor="middle" font-weight="600">Usuario escribe: "JESUS"</text>
  
  <!-- Timeline con debounce -->
  <line x1="680" y1="160" x2="1120" y2="160" stroke="#e0e0e0" stroke-width="2"/>
  
  <circle cx="700" cy="160" r="8" fill="#80868b"/>
  <text x="700" y="185" class="small-text" text-anchor="middle">J</text>
  <text x="700" y="200" class="small-text" text-anchor="middle" fill="#80868b">Espera</text>
  
  <circle cx="780" cy="160" r="8" fill="#80868b"/>
  <text x="780" y="185" class="small-text" text-anchor="middle">E</text>
  <text x="780" y="200" class="small-text" text-anchor="middle" fill="#80868b">Espera</text>
  
  <circle cx="860" cy="160" r="8" fill="#80868b"/>
  <text x="860" y="185" class="small-text" text-anchor="middle">S</text>
  <text x="860" y="200" class="small-text" text-anchor="middle" fill="#80868b">Espera</text>
  
  <circle cx="940" cy="160" r="8" fill="#80868b"/>
  <text x="940" y="185" class="small-text" text-anchor="middle">U</text>
  <text x="940" y="200" class="small-text" text-anchor="middle" fill="#80868b">Espera</text>
  
  <circle cx="1020" cy="160" r="8" fill="#80868b"/>
  <text x="1020" y="185" class="small-text" text-anchor="middle">S</text>
  <text x="1020" y="200" class="small-text" text-anchor="middle" fill="#80868b">Espera</text>
  
  <!-- Espera 300ms -->
  <path d="M 1020 160 L 1100 160" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="1060" y="150" class="small-text" fill="#4CAF50">300ms</text>
  
  <circle cx="1100" cy="160" r="10" fill="#4CAF50"/>
  <text x="1100" y="185" class="small-text" text-anchor="middle" font-weight="600">✓</text>
  <text x="1100" y="200" class="small-text" text-anchor="middle" fill="#4CAF50">Busca</text>
  
  <text x="900" y="240" class="text" text-anchor="middle" font-weight="600" fill="#4CAF50">Ventaja:</text>
  <text x="900" y="265" class="small-text" text-anchor="middle">Solo 1 búsqueda al final</text>
  <text x="900" y="285" class="small-text" text-anchor="middle">Renderiza la tabla 1 vez</text>
  <text x="900" y="305" class="small-text" text-anchor="middle">Ahorra recursos</text>
  <text x="900" y="325" class="small-text" text-anchor="middle">Interfaz más fluida</text>
  
  <!-- CÓDIGO -->
  <text x="50" y="400" class="subtitle">Implementación del Debounce</text>
  
  <rect x="50" y="420" width="1100" height="240" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2" rx="8"/>
  
  <text x="80" y="450" class="code">let busquedaTimer = null;</text>
  <text x="80" y="475" class="code"></text>
  <text x="80" y="500" class="code">export function buscarClientePago(busqueda) {</text>
  <text x="100" y="525" class="code">// 1. Cancelar búsqueda anterior si existe</text>
  <text x="100" y="545" class="code" fill="#f44336">if (busquedaTimer) clearTimeout(busquedaTimer);</text>
  <text x="100" y="570" class="code"></text>
  <text x="100" y="590" class="code">// 2. Programar nueva búsqueda en 300ms</text>
  <text x="100" y="610" class="code" fill="#4CAF50">busquedaTimer = setTimeout(() => {</text>
  <text x="120" y="630" class="code" fill="#4CAF50">  renderizarPanelPagos();</text>
  <text x="100" y="650" class="code" fill="#4CAF50">}, 300);</text>
  <text x="80" y="670" class="code">}</text>
  
</svg>
