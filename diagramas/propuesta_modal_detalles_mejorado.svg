    <text x="120" y="1345" font-family="Courier New" font-size="10" fill="#E0E0E0">width: 90vw !important;</text>
    <text x="120" y="1365" font-family="Courier New" font-size="10" fill="#E0E0E0">max-width: 900px !important;</text>
    <text x="120" y="1385" font-family="Courier New" font-size="10" fill="#E0E0E0">padding: 20px !important;</text>
    <text x="120" y="1405" font-family="Courier New" font-size="10" fill="#E0E0E0">border-radius: 12px;</text>
    <text x="100" y="1425" font-family="Courier New" font-size="10" fill="#81C784">}</text>
    
    <text x="100" y="1450" font-family="Courier New" font-size="10" fill="#81C784">.modal-header {</text>
    <text x="120" y="1470" font-family="Courier New" font-size="10" fill="#E0E0E0">height: 70px;</text>
    <text x="120" y="1490" font-family="Courier New" font-size="10" fill="#E0E0E0">padding: 20px;</text>
    <text x="100" y="1510" font-family="Courier New" font-size="10" fill="#81C784">}</text>
  </g>
  
  <!-- Definiciones de filtros -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
