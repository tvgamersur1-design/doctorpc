<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 140">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f4c75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b7fb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3bb4e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b7fb8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Fondo principal con gradiente -->
  <rect width="1400" height="140" fill="url(#headerGradient)"/>
  
  <!-- Barra de acento superior -->
  <rect width="1400" height="4" fill="#3bb4e5"/>
  
  <!-- Patrón decorativo sutil -->
  <g opacity="0.05">
    <circle cx="1300" cy="70" r="80" fill="white"/>
    <circle cx="1350" cy="30" r="50" fill="white"/>
  </g>
  
  <!-- Contenedor del logo -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="80" height="80" rx="12" fill="white"/>
    <!-- Icono Doctor PC simplificado -->
    <g transform="translate(80, 70)">
      <circle cx="0" cy="-10" r="12" fill="#1b7fb8"/>
      <rect x="-8" y="2" width="16" height="20" rx="2" fill="#1b7fb8"/>
      <path d="M -15,8 L -8,8 M 8,8 L 15,8" stroke="#1b7fb8" stroke-width="2" stroke-linecap="round"/>
      <rect x="-3" y="6" width="6" height="8" fill="white" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Título principal -->
  <text x="145" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600" fill="white">
    Doctor PC
  </text>
  
  <!-- Subtítulo -->
  <text x="145" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="white" opacity="0.9">
    Sistema de Administración
  </text>
  
  <!-- Descripción -->
  <text x="145" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="white" opacity="0.7">
    Gestiona clientes, servicios y equipos de manera eficiente
  </text>
  
  <!-- Línea divisoria vertical -->
  <line x1="480" y1="35" x2="480" y2="105" stroke="white" stroke-width="1" opacity="0.2"/>
  
  <!-- Información del usuario (derecha) -->
  <g transform="translate(1100, 50)">
    <!-- Icono de usuario -->
    <circle cx="0" cy="20" r="24" fill="white" opacity="0.15"/>
    <circle cx="0" cy="15" r="8" fill="white"/>
    <path d="M -12,35 Q 0,28 12,35" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Nombre de usuario -->
    <text x="35" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="white">
      Usuario Activo
    </text>
    <text x="35" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" opacity="0.7">
      Administrador
    </text>
  </g>
  
  <!-- Botón de notificaciones -->
  <g transform="translate(1260, 60)">
    <circle cx="0" cy="0" r="20" fill="white" opacity="0.15"/>
    <path d="M -6,-8 L -6,-2 C -6,2 -4,4 0,4 C 4,4 6,2 6,-2 L 6,-8 C 6,-10 4,-12 0,-12 C -4,-12 -6,-10 -6,-8 Z" fill="white"/>
    <circle cx="0" cy="6" r="1.5" fill="white"/>
    <!-- Badge de notificación -->
    <circle cx="8" cy="-8" r="6" fill="#ff4757"/>
    <text x="8" y="-5" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">3</text>
  </g>
  
  <!-- Botón de configuración -->
  <g transform="translate(1310, 60)">
    <circle cx="0" cy="0" r="20" fill="white" opacity="0.15"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="white" stroke-width="2"/>
    <g stroke="white" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-10" x2="0" y2="-8"/>
      <line x1="0" y1="8" x2="0" y2="10"/>
      <line x1="10" y1="0" x2="8" y2="0"/>
      <line x1="-8" y1="0" x2="-10" y2="0"/>
      <line x1="7" y1="-7" x2="5.5" y2="-5.5"/>
      <line x1="-5.5" y1="5.5" x2="-7" y2="7"/>
      <line x1="7" y1="7" x2="5.5" y2="5.5"/>
      <line x1="-5.5" y1="-5.5" x2="-7" y2="-7"/>
    </g>
  </g>
  
  <!-- Indicador de módulo activo (opcional) -->
  <g transform="translate(520, 70)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="white" opacity="0.15"/>
    <text x="20" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="white">
      📊 Dashboard
    </text>
  </g>
  
  <!-- Breadcrumb / Ruta actual -->
  <g transform="translate(680, 78)">
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" opacity="0.6">
      Inicio › Gestión › Usuarios
    </text>
  </g>
  
  <!-- Sombra inferior -->
  <rect y="136" width="1400" height="4" fill="black" opacity="0.1"/>
</svg>