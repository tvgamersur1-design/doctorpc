<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <defs>
    <!-- Gradientes para tema oscuro -->
    <linearGradient id="fondoModalOscuro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#1e2a3a"/>
    </linearGradient>
    
    <linearGradient id="headerModalOscuro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1e2a3a"/>
    </linearGradient>
    
    <linearGradient id="seccionOscura" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a3a"/>
      <stop offset="100%" style="stop-color:#243447"/>
    </linearGradient>
    
    <linearGradient id="totalOscuro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1e2a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Título principal -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#3bb4e5" text-anchor="middle">
    🌙 Modal Ver Información - Tema Oscuro
  </text>
  
  <text x="700" y="70" font-family="Arial, sans-serif" font-size="14" fill="#90cdf4" text-anchor="middle">
    Diseño elegante y profesional con excelente contraste
  </text>
  
  <!-- Fondo oscuro del overlay -->
  <rect x="50" y="100" width="1300" height="850" fill="rgba(0,0,0,0.85)" rx="10"/>
  
  <!-- Modal contenedor -->
  <rect x="200" y="150" width="1000" height="750" fill="url(#fondoModalOscuro)" rx="12" stroke="#2d3748" stroke-width="2"/>
  
  <!-- Botón cerrar -->
  <circle cx="1160" cy="180" r="19" fill="#ff4444"/>
  <text x="1160" y="188" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">×</text>
  
  <!-- Header del modal -->
  <rect x="200" y="150" width="1000" height="100" fill="url(#headerModalOscuro)" rx="12"/>
  <line x1="200" y1="250" x2="1200" y2="250" stroke="#2d3748" stroke-width="3"/>
  
  <text x="700" y="195" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3bb4e5" text-anchor="middle">
    ORDEN DE SERVICIO
  </text>
  
  <rect x="620" y="210" width="160" height="30" fill="#243447" rx="15"/>
  <text x="700" y="232" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3bb4e5" text-anchor="middle">
    SRV-2026-005
  </text>
  
  <!-- Sección: Información del Cliente -->
  <rect x="230" y="280" width="940" height="100" fill="url(#seccionOscura)" rx="8"/>
  <rect x="230" y="280" width="5" height="100" fill="#3bb4e5" rx="2"/>
  
  <text x="250" y="305" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3bb4e5">
    👤 INFORMACIÓN DEL CLIENTE
  </text>
  
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <tspan fill="#90cdf4" font-weight="600">Cliente:</tspan> JESUS FERNANDO
  </text>
  <text x="250" y="350" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <tspan fill="#90cdf4" font-weight="600">DNI:</tspan> 60160048
  </text>
  <text x="250" y="370" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <tspan fill="#90cdf4" font-weight="600">Teléfono:</tspan> 921709774
  </text>
  
  <!-- Sección: Equipo -->
  <rect x="230" y="400" width="940" height="80" fill="url(#seccionOscura)" rx="8"/>
  <rect x="230" y="400" width="5" height="80" fill="#3bb4e5" rx="2"/>
  
  <text x="250" y="425" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3bb4e5">
    💻 EQUIPO
  </text>
  
  <text x="250" y="450" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <tspan fill="#90cdf4" font-weight="600">Marca:</tspan> EPSON
  </text>
  <text x="250" y="470" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <tspan fill="#90cdf4" font-weight="600">Modelo:</tspan> L220
  </text>
  
  <!-- Sección: Diagnóstico -->
  <rect x="230" y="500" width="940" height="100" fill="url(#seccionOscura)" rx="8"/>
  <rect x="230" y="500" width="5" height="100" fill="#3bb4e5" rx="2"/>
  
  <text x="250" y="525" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3bb4e5">
    🔍 DIAGNÓSTICO REALIZADO
  </text>
  
  <text x="250" y="550" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">
    <tspan fill="#90cdf4" font-weight="600">Técnico:</tspan> Jesus lucero
  </text>
  
  <rect x="250" y="560" width="120" height="22" fill="#1e3a5f" rx="4" stroke="#2c5282" stroke-width="1"/>
  <text x="310" y="576" font-family="Arial, sans-serif" font-size="11" fill="#63b3ed" text-anchor="middle" font-weight="600">
    ✓ Diagnóstico
  </text>
  
  <!-- Sección: Resumen Financiero -->
  <rect x="230" y="620" width="940" height="140" fill="url(#seccionOscura)" rx="8"/>
  <rect x="230" y="620" width="5" height="140" fill="#3bb4e5" rx="2"/>
  
  <text x="250" y="645" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3bb4e5">
    💰 RESUMEN FINANCIERO
  </text>
  
  <!-- Tabla de costos -->
  <rect x="260" y="660" width="900" height="30" fill="#243447" rx="4"/>
  <text x="270" y="680" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
    Monto Total
  </text>
  <text x="1140" y="680" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3bb4e5" text-anchor="end">
    2323.00
  </text>
  
  <rect x="260" y="690" width="900" height="30" fill="#1e2a3a" rx="4"/>
  <text x="270" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
    A Cuenta
  </text>
  <text x="1140" y="710" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3bb4e5" text-anchor="end">
    23.00
  </text>
  
  <!-- Total -->
  <rect x="260" y="720" width="900" height="35" fill="url(#totalOscuro)" rx="4"/>
  <text x="270" y="743" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
    SALDO PENDIENTE
  </text>
  <text x="1140" y="743" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3bb4e5" text-anchor="end">
    2300.00
  </text>
  
  <!-- Botones de acción -->
  <rect x="230" y="780" width="940" height="100" fill="linear-gradient(to top, #0f1419, transparent)" rx="0 0 12 12"/>
  
  <!-- Botón PDF -->
  <rect x="280" y="810" width="180" height="45" fill="#4CAF50" rx="8"/>
  <text x="370" y="838" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">
    📄 Descargar PDF
  </text>
  
  <!-- Botón Imprimir -->
  <rect x="480" y="810" width="180" height="45" fill="#2196F3" rx="8"/>
  <text x="570" y="838" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">
    🖨️ Imprimir
  </text>
  
  <!-- Botón WhatsApp -->
  <rect x="680" y="810" width="180" height="45" fill="#25D366" rx="8"/>
  <text x="770" y="838" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">
    📱 WhatsApp
  </text>
  
  <!-- Botón Cerrar -->
  <rect x="880" y="810" width="180" height="45" fill="#757575" rx="8"/>
  <text x="970" y="838" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">
    ✕ Cerrar
  </text>
  
  <!-- Paleta de colores -->
  <text x="100" y="980" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3bb4e5">
    Paleta de Colores:
  </text>
  
  <rect x="100" y="990" width="120" height="30" fill="#1a2332" rx="4" stroke="#3bb4e5" stroke-width="1"/>
  <text x="160" y="1012" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e0" text-anchor="middle">
    Fondo Modal
  </text>
  
  <rect x="230" y="990" width="120" height="30" fill="#0d1b2a" rx="4" stroke="#3bb4e5" stroke-width="1"/>
  <text x="290" y="1012" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e0" text-anchor="middle">
    Header
  </text>
  
  <rect x="360" y="990" width="120" height="30" fill="#1e2a3a" rx="4" stroke="#3bb4e5" stroke-width="1"/>
  <text x="420" y="1012" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e0" text-anchor="middle">
    Secciones
  </text>
  
  <rect x="490" y="990" width="120" height="30" fill="#243447" rx="4" stroke="#3bb4e5" stroke-width="1"/>
  <text x="550" y="1012" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e0" text-anchor="middle">
    Hover
  </text>
  
  <rect x="620" y="990" width="120" height="30" fill="#3bb4e5" rx="4"/>
  <text x="680" y="1012" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
    Accent
  </text>
  
  <rect x="750" y="990" width="120" height="30" fill="#cbd5e0" rx="4"/>
  <text x="810" y="1012" font-family="Arial, sans-serif" font-size="11" fill="#1a2332" text-anchor="middle">
    Texto
  </text>
  
  <!-- Ventajas -->
  <rect x="900" y="980" width="450" height="40" fill="#1e4620" rx="5" stroke="#38a169" stroke-width="2"/>
  <text x="1125" y="1005" font-family="Arial, sans-serif" font-size="12" fill="#9ae6b4" text-anchor="middle" font-weight="bold">
    ✨ Contraste perfecto • Legible • Profesional • Elegante
  </text>
</svg>