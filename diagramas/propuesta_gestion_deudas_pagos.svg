  <text x="380" y="1635" class="small-text" font-weight="bold" fill="#c0392b">Saldo Pendiente:</text>
  <text x="550" y="1635" class="small-text" fill="#c0392b" font-weight="bold">S/ 350.00</text>

  <rect x="380" y="1650" width="640" height="1" style="fill: #bdc3c7;"/>

  <text x="380" y="1675" class="small-text" font-weight="bold">Monto a Pagar: *</text>
  <rect x="550" y="1660" width="200" height="25" class="label-bg"/>
  <text x="560" y="1678" class="small-text">S/ [_______]</text>

  <text x="380" y="1710" class="small-text" font-weight="bold">Método de Pago: *</text>
