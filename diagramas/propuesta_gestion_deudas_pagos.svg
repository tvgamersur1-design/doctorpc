  <text x="360" y="1137" class="small-text" fill="#fff" font-weight="bold">Servicio</text>
  <text x="600" y="1137" class="small-text" fill="#fff" font-weight="bold">Equipo</text>
  <text x="820" y="1137" class="small-text" fill="#fff" font-weight="bold">Monto</text>
  <text x="930" y="1137" class="small-text" fill="#fff" font-weight="bold">Pagado</text>
  <text x="1040" y="1137" class="small-text" fill="#fff" font-weight="bold">Estado</text>

  <!-- Servicio 1 -->
  <rect x="220" y="1145" width="960" height="25" style="fill: #ffebee;"/>
  <text x="240" y="1162" class="small-text">15/02/24</text>
  <text x="360" y="1162" class="small-text">Reparación Laptop</text>
  <text x="600" y="1162" class="small-text">Dell Latitude</text>
  <text x="820" y="1162" class="small-text">S/ 500</text>
  <text x="930" y="1162" class="small-text">S/ 150</text>
  <text x="1040" y="1162" class="small-text" fill="#c0392b">⚠️ Debe S/ 350</text>

  <!-- Servicio 2 -->
  <rect x="220" y="1170" width="960" height="25" style="fill: #e8f5e9;"/>
  <text x="240" y="1187" class="small-text">10/01/24</text>
  <text x="360" y="1187" class="small-text">Mantenimiento</text>
  <text x="600" y="1187" class="small-text">HP Desktop</text>
  <text x="820" y="1187" class="small-text">S/ 200</text>
  <text x="930" y="1187" class="small-text">S/ 200</text>
  <text x="1040" y="1187" class="small-text" fill="#27ae60">✅ Pagado</text>

  <!-- Servicio 3 -->
  <rect x="220" y="1195" width="960" height="25" style="fill: #e8f5e9;"/>
  <text x="240" y="1212" class="small-text">05/12/23</text>
  <text x="360" y="1212" class="small-text">Instalación Office</text>
  <text x="600" y="1212" class="small-text">Dell Latitude</text>
  <text x="820" y="1212" class="small-text">S/ 150</text>
  <text x="930" y="1212" class="small-text">S/ 150</text>
  <text x="1040" y="1212" class="small-text" fill="#27ae60">✅ Pagado</text>

  <!-- Servicio 4 -->
  <rect x="220" y="1220" width="960" height="25" style="fill: #e8f5e9;"/>
  <text x="240" y="1237" class="small-text">20/11/23</text>
  <text x="360" y="1237" class="small-text">Diagnóstico</text>
  <text x="600" y="1237" class="small-text">Impresora Canon</text>
  <text x="820" y="1237" class="small-text">S/ 50</text>
  <text x="930" y="1237" class="small-text">S/ 50</text>
  <text x="1040" y="1237" class="small-text" fill="#27ae60">✅ Pagado</text>


  <!-- Resumen -->
  <rect x="220" y="1260" width="960" height="80" style="fill: #ecf0f1; stroke: #34495e; stroke-width: 2;"/>
  <text x="240" y="1280" class="small-text" font-weight="bold">RESUMEN FINANCIERO:</text>
  <text x="240" y="1305" class="small-text">📊 Total de servicios: 4</text>
  <text x="500" y="1305" class="small-text">💵 Monto total facturado: S/ 900.00</text>
  <text x="240" y="1325" class="small-text" fill="#27ae60" font-weight="bold">✅ Total pagado: S/ 550.00</text>
  <text x="500" y="1325" class="small-text" fill="#c0392b" font-weight="bold">⚠️ Saldo pendiente: S/ 350.00</text>

  <!-- Botones -->
  <rect x="220" y="1360" width="200" height="40" style="fill: #27ae60; stroke: #1e8449; stroke-width: 2; cursor: pointer;"/>
  <text x="320" y="1385" class="text" fill="#fff" text-anchor="middle">💰 Registrar Pago</text>

  <rect x="450" y="1360" width="200" height="40" style="fill: #3498db; stroke: #2874a6; stroke-width: 2; cursor: pointer;"/>
  <text x="550" y="1385" class="text" fill="#fff" text-anchor="middle">📄 Generar Reporte</text>

  <rect x="680" y="1360" width="200" height="40" style="fill: #95a5a6; stroke: #7f8c8d; stroke-width: 2; cursor: pointer;"/>
  <text x="780" y="1385" class="text" fill="#fff" text-anchor="middle">📧 Enviar Estado</text>

  <rect x="910" y="1360" width="200" height="40" style="fill: #e74c3c; stroke: #c0392b; stroke-width: 2; cursor: pointer;"/>
  <text x="1010" y="1385" class="text" fill="#fff" text-anchor="middle">✕ Cerrar</text>

  <!-- SECCIÓN 5: MODAL DE REGISTRO DE PAGO -->
  <text x="50" y="1490" class="subtitle">5. MODAL - REGISTRAR PAGO</text>

  <!-- Modal de pago -->
  <rect x="350" y="1520" width="700" height="250" class="box" style="stroke-width: 3;"/>
  <rect x="350" y="1520" width="700" height="40" style="fill: #27ae60;"/>
  <text x="700" y="1545" class="text" fill="#fff" text-anchor="middle" font-size="16">REGISTRAR PAGO - Orden #ORD-2024-0001</text>

  <!-- Formulario -->
