  <rect x="720" y="1730" width="150" height="30" style="fill: #95a5a6; stroke: #7f8c8d; stroke-width: 2; cursor: pointer;"/>
  <text x="795" y="1750" class="text" fill="#fff" text-anchor="middle">✕ Cancelar</text>

</svg>