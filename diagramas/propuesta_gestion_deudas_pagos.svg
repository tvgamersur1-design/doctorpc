  <text x="560" y="1713" class="small-text">[Efectivo ▼]</text>

  <text x="780" y="1710" class="small-text">Referencia:</text>
  <rect x="880" y="1695" width="140" height="25" class="label-bg"/>

  <!-- Botones -->
  <rect x="550" y="1730" width="150" height="30" style="fill: #27ae60; stroke: #1e8449; stroke-width: 2; cursor: pointer;"/>
