<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Fondo general -->
  <rect width="380" height="320" fill="#F5F7FA" rx="4"/>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="380" height="22" fill="#2192B8" rx="3"/>
  <rect x="0" y="16" width="380" height="6" fill="#2192B8"/>
  <text x="190" y="15" text-anchor="middle" fill="white" font-size="9" font-weight="700" letter-spacing="0.5">DETALLE DE PAGOS</text>

  <!-- ===== BLOQUE 1: RESUMEN FINANCIERO ===== -->
  <!-- Fila Adelanto -->
  <rect x="8" y="28" width="364" height="16" fill="white" rx="2"/>
  <text x="16" y="39" fill="#2192B8" font-size="8" font-weight="700">Adelanto:</text>
  <text x="72" y="39" fill="#333" font-size="8">S/. 75.00</text>
  <!-- Barra de progreso pago -->
  <rect x="160" y="33" width="180" height="5" fill="#E0E0E0" rx="2.5"/>
  <rect x="160" y="33" width="180" height="5" fill="#2192B8" rx="2.5"/>
  <text x="344" y="39" fill="#2192B8" font-size="7" font-weight="700" text-anchor="end">100%</text>

  <!-- Fila Saldo -->
  <rect x="8" y="46" width="364" height="16" fill="#EBF5FB" rx="2"/>
  <text x="16" y="57" fill="#2192B8" font-size="8" font-weight="700">Saldo pendiente:</text>
  <text x="100" y="57" fill="#1976a2" font-size="8" font-weight="700">S/. 0.00</text>
  <!-- Badge PAGADO -->
  <rect x="290" y="49" width="74" height="11" fill="#2192B8" rx="5"/>
  <text x="327" y="57.5" text-anchor="middle" fill="white" font-size="7" font-weight="700">✓ PAGADO</text>

  <!-- Separador punteado -->
  <line x1="8" y1="68" x2="372" y2="68" stroke="#B0C4D8" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ===== BLOQUE 2: DATOS DE COBRO ===== -->
  <text x="16" y="78" fill="#2192B8" font-size="7" font-weight="700" letter-spacing="0.3">COBRO EN ENTREGA</text>

  <rect x="8" y="81" width="364" height="14" fill="white" rx="2"/>
  <text x="16" y="91" fill="#2192B8" font-size="7.5" font-weight="700">Cobrado:</text>
  <text x="62" y="91" fill="#333" font-size="7.5">S/. 0.00</text>
  <text x="140" y="91" fill="#2192B8" font-size="7.5" font-weight="700">Metodo:</text>
  <text x="178" y="91" fill="#333" font-size="7.5">Efectivo</text>
  <text x="240" y="91" fill="#2192B8" font-size="7.5" font-weight="700">Comprobante:</text>
  <text x="308" y="91" fill="#999" font-size="7.5" font-style="italic">Sin comprobante</text>

  <!-- Separador punteado -->
  <line x1="8" y1="101" x2="372" y2="101" stroke="#B0C4D8" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ===== BLOQUE 3: HISTORIAL ===== -->
  <text x="16" y="111" fill="#2192B8" font-size="7" font-weight="700" letter-spacing="0.3">HISTORIAL DE PAGOS</text>

  <!-- Tabla header -->
  <rect x="8" y="114" width="364" height="13" fill="#1976a2" rx="2"/>
  <text x="16"  y="123" fill="white" font-size="7" font-weight="700">Fecha</text>
  <text x="100" y="123" fill="white" font-size="7" font-weight="700">Monto</text>
  <text x="180" y="123" fill="white" font-size="7" font-weight="700">Metodo</text>
  <text x="280" y="123" fill="white" font-size="7" font-weight="700">Referencia</text>

  <!-- Fila 1 -->
  <rect x="8" y="127" width="364" height="13" fill="#EBF2F8" rx="0"/>
  <text x="16"  y="136.5" fill="#333" font-size="7">15/04/2026</text>
  <text x="100" y="136.5" fill="#1976a2" font-size="7" font-weight="600">S/. 50.00</text>
  <text x="180" y="136.5" fill="#333" font-size="7">Transferencia</text>
  <text x="280" y="136.5" fill="#333" font-size="7">TRF-001</text>

  <!-- Fila 2 -->
  <rect x="8" y="140" width="364" height="13" fill="white" rx="0"/>
  <text x="16"  y="149.5" fill="#333" font-size="7">20/04/2026</text>
  <text x="100" y="149.5" fill="#1976a2" font-size="7" font-weight="600">S/. 25.00</text>
  <text x="180" y="149.5" fill="#333" font-size="7">Efectivo</text>
  <text x="280" y="149.5" fill="#999" font-size="7" font-style="italic">Sin ref.</text>

  <!-- Línea divisora tabla -->
  <line x1="8" y1="153" x2="372" y2="153" stroke="#D2E1EB" stroke-width="0.5"/>

  <!-- Total historial -->
  <rect x="8" y="153" width="364" height="13" fill="#2192B8" rx="0 0 2 2"/>
  <text x="16"  y="162.5" fill="white" font-size="7" font-weight="700">Total pagado:</text>
  <text x="100" y="162.5" fill="white" font-size="7.5" font-weight="700">S/. 75.00</text>
  <text x="240" y="162.5" fill="white" font-size="7">2 transacciones</text>

  <!-- ===== BADGE FINAL ===== -->
  <rect x="8" y="170" width="364" height="16" fill="#156590" rx="0 0 3 3"/>
  <text x="190" y="181" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" letter-spacing="0.5">✓ PAGADO COMPLETO</text>

  <!-- ===== LEYENDA / NOTA ===== -->
  <text x="190" y="205" text-anchor="middle" fill="#999" font-size="7" font-style="italic">Propuesta A — Barra de progreso + total historial + badge final</text>

  <!-- ===== SEPARADOR ===== -->
  <line x1="20" y1="215" x2="360" y2="215" stroke="#DDD" stroke-width="1"/>
  <text x="190" y="225" text-anchor="middle" fill="#2192B8" font-size="7.5" font-weight="700">VARIANTE COMPACTA (sin barra de progreso)</text>

  <!-- ===== VARIANTE B COMPACTA ===== -->
  <rect x="8" y="230" width="364" height="80" fill="#F5F7FA" rx="3"/>
  <rect x="8" y="230" width="364" height="13" fill="#2192B8" rx="3 3 0 0"/>
  <text x="190" y="239.5" text-anchor="middle" fill="white" font-size="8" font-weight="700" letter-spacing="0.5">DETALLE DE PAGOS</text>

  <!-- Dos columnas -->
  <!-- Col izq -->
  <text x="16" y="252" fill="#2192B8" font-size="7" font-weight="700">Adelanto:</text>
  <text x="60" y="252" fill="#333" font-size="7">S/. 75.00</text>
  <text x="16" y="261" fill="#2192B8" font-size="7" font-weight="700">Saldo:</text>
  <text x="60" y="261" fill="#1976a2" font-size="7" font-weight="700">S/. 0.00</text>
  <text x="16" y="270" fill="#2192B8" font-size="7" font-weight="700">Cobrado:</text>
  <text x="60" y="270" fill="#333" font-size="7">S/. 0.00</text>
  <text x="16" y="279" fill="#2192B8" font-size="7" font-weight="700">Metodo:</text>
  <text x="60" y="279" fill="#333" font-size="7">Efectivo</text>

  <!-- Divisor vertical -->
  <line x1="190" y1="244" x2="190" y2="285" stroke="#D2E1EB" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Col der — historial mini -->
  <text x="198" y="249" fill="#2192B8" font-size="6.5" font-weight="700">Historial:</text>
  <rect x="198" y="251" width="166" height="9" fill="#1976a2" rx="1"/>
  <text x="202" y="257.5" fill="white" font-size="5.5" font-weight="700">Fecha</text>
  <text x="240" y="257.5" fill="white" font-size="5.5" font-weight="700">Monto</text>
  <text x="290" y="257.5" fill="white" font-size="5.5" font-weight="700">Metodo</text>
  <rect x="198" y="260" width="166" height="8" fill="#EBF2F8"/>
  <text x="202" y="266" fill="#333" font-size="5.5">15/04/2026</text>
  <text x="240" y="266" fill="#1976a2" font-size="5.5" font-weight="600">S/.75.00</text>
  <text x="290" y="266" fill="#333" font-size="5.5">Transf.</text>
  <rect x="198" y="268" width="166" height="8" fill="white"/>
  <text x="202" y="274" fill="#333" font-size="5.5">20/04/2026</text>
  <text x="240" y="274" fill="#1976a2" font-size="5.5" font-weight="600">S/.25.00</text>
  <text x="290" y="274" fill="#333" font-size="5.5">Efectivo</text>

  <!-- Badge final variante B -->
  <rect x="8" y="285" width="364" height="12" fill="#156590" rx="0 0 3 3"/>
  <text x="190" y="293.5" text-anchor="middle" fill="white" font-size="7.5" font-weight="700" letter-spacing="0.5">✓ PAGADO COMPLETO — S/. 75.00</text>

  <text x="190" y="312" text-anchor="middle" fill="#999" font-size="7" font-style="italic">Propuesta B — Dos columnas: resumen izq. + historial der.</text>

</svg>
