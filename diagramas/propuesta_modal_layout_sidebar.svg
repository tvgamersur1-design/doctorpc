<svg viewBox="0 0 1400 2000" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="1400" height="2000" fill="#f0f0f0"/>
  
  <!-- Título Principal -->
  <text x="700" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2192B8" text-anchor="middle">🎨 Propuesta: Modal con Sidebar (Inspirado en la Sugerencia)</text>
  
  <!-- Mockup del Modal Mejorado -->
  <g id="modal-mejorado">
    <!-- Contenedor principal del modal -->
    <rect x="50" y="100" width="1300" height="1850" fill="white" stroke="#2192B8" stroke-width="4" rx="16" filter="url(#shadow)"/>
    
    <!-- Header del Modal -->
    <rect x="50" y="100" width="1300" height="80" fill="url(#headerGradient)" rx="16 16 0 0"/>
    
    <!-- Título en header -->
    <text x="80" y="145" font-family="Arial" font-size="22" fill="white" font-weight="bold">🔍 Servicio SRV-2026-004</text>
    
    <!-- Botones de acción en header -->
    <g id="action-buttons">
      <!-- PDF -->
      <rect x="950" y="120" width="90" height="45" fill="#FF6B6B" rx="8" filter="url(#buttonShadow)"/>
      <text x="995" y="148" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">📄 PDF</text>
      
      <!-- Imprimir -->
      <rect x="1050" y="120" width="100" height="45" fill="#9C5FD8" rx="8" filter="url(#buttonShadow)"/>
      <text x="1100" y="148" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">🖨️ Imprimir</text>
      
      <!-- WhatsApp -->
      <rect x="1160" y="120" width="110" height="45" fill="#25D366" rx="8" filter="url(#buttonShadow)"/>
      <text x="1215" y="148" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">💬 WhatsApp</text>
      
      <!-- Cerrar -->
      <circle cx="1310" cy="142" r="22" fill="#f44336" filter="url(#buttonShadow)"/>
      <text x="1310" y="152" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">×</text>
    </g>
    
    <!-- Contenedor de contenido (Sidebar + Main) -->
    <g id="content-container">
      <!-- SIDEBAR IZQUIERDO (280px) -->
      <rect x="50" y="180" width="280" height="1770" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2"/>
      
      <!-- Estado del Servicio -->
      <g id="sidebar-estado">
        <text x="70" y="220" font-family="Arial" font-size="12" fill="#666" font-weight="600">Estado del Servicio</text>
        <rect x="70" y="230" width="240" height="40" fill="#4CAF50" rx="6"/>
        <text x="190" y="255" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">✅ ENTREGADO</text>
      </g>
      
      <!-- Cliente -->
      <g id="sidebar-cliente">
        <text x="70" y="300" font-family="Arial" font-size="12" fill="#666" font-weight="600">👤 Cliente</text>
        <text x="70" y="325" font-family="Arial" font-size="15" fill="#1e3c72" font-weight="bold">JESUS FERNANDO</text>
        <text x="70" y="345" font-family="Arial" font-size="11" fill="#666">🆔 60160048</text>
        <text x="70" y="365" font-family="Arial" font-size="11" fill="#666">📞 921709774</text>
      </g>
      
      <!-- Equipo -->
      <g id="sidebar-equipo">
        <rect x="70" y="390" width="240" height="1" fill="#e0e0e0"/>
        <text x="70" y="420" font-family="Arial" font-size="12" fill="#666" font-weight="600">💻 Equipo</text>
        <text x="70" y="445" font-family="Arial" font-size="14" fill="#1e3c72" font-weight="bold">Epson L220</text>
        <text x="70" y="465" font-family="Arial" font-size="11" fill="#666">Impresora</text>
      </g>
      
      <!-- Ubicación -->
      <g id="sidebar-ubicacion">
        <rect x="70" y="490" width="240" height="1" fill="#e0e0e0"/>
        <text x="70" y="520" font-family="Arial" font-size="12" fill="#666" font-weight="600">📍 Ubicación</text>
        <rect x="70" y="530" width="240" height="35" fill="#BBDEFB" rx="6"/>
        <text x="190" y="553" font-family="Arial" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">SUCURSAL CHICLAYO</text>
        <text x="70" y="580" font-family="Arial" font-size="10" fill="#666">Ingreso: 2026-04-07 12:23</text>
      </g>
      
      <!-- Resumen de Pago (Destacado) -->
      <g id="sidebar-pago">
        <rect x="70" y="610" width="240" height="1" fill="#e0e0e0"/>
        <text x="70" y="640" font-family="Arial" font-size="12" fill="#666" font-weight="600">💰 Resumen Pago</text>
        
        <!-- Total -->
        <rect x="70" y="655" width="240" height="50" fill="#E3F2FD" rx="6"/>
        <text x="85" y="675" font-family="Arial" font-size="11" fill="#666">TOTAL</text>
        <text x="85" y="695" font-family="Arial" font-size="20" fill="#2196F3" font-weight="bold">300.00</text>
        
        <!-- Abono -->
        <rect x="70" y="715" width="240" height="50" fill="#E8F5E9" rx="6"/>
        <text x="85" y="735" font-family="Arial" font-size="11" fill="#666">ABONO</text>
        <text x="85" y="755" font-family="Arial" font-size="20" fill="#4CAF50" font-weight="bold">0.00</text>
        
        <!-- Saldo -->
        <rect x="70" y="775" width="240" height="50" fill="#FFEBEE" rx="6"/>
        <text x="85" y="795" font-family="Arial" font-size="11" fill="#666">SALDO</text>
        <text x="85" y="815" font-family="Arial" font-size="20" fill="#d32f2f" font-weight="bold">300.00</text>
      </g>
      
      <!-- Nota informativa -->
      <rect x="70" y="1850" width="240" height="80" fill="#FFF3CD" rx="6" stroke="#FF9800" stroke-width="2"/>
      <text x="190" y="1875" font-family="Arial" font-size="10" fill="#856404" text-anchor="middle" font-weight="600">💡 Información</text>
      <text x="190" y="1895" font-family="Arial" font-size="9" fill="#856404" text-anchor="middle">Servicio completado</text>
      <text x="190" y="1910" font-family="Arial" font-size="9" fill="#856404" text-anchor="middle">y entregado al cliente</text>
      <text x="190" y="1925" font-family="Arial" font-size="9" fill="#856404" text-anchor="middle">el 07/04/2026</text>
      
      <!-- CONTENIDO PRINCIPAL (Derecha) -->
      <g id="main-content">
        <!-- Problema Reportado -->
        <rect x="360" y="200" width="450" height="140" fill="#FFF8E1" stroke="#FF9800" stroke-width="2" rx="8"/>
        <text x="380" y="230" font-family="Arial" font-size="15" fill="#E65100" font-weight="bold">⚠️ Problema Reportado</text>
        <text x="380" y="260" font-family="Arial" font-size="13" fill="#424242">"Pantalla rota, No enciende"</text>
        <rect x="380" y="280" width="410" height="40" fill="#FFE0B2" rx="4"/>
        <text x="395" y="305" font-family="Arial" font-size="11" fill="#E65100" font-weight="600">Nota: niguna</text>
        
        <!-- Resumen Pago (Card) -->
        <rect x="840" y="200" width="480" height="140" fill="white" stroke="#e0e0e0" stroke-width="2" rx="8"/>
        <text x="860" y="230" font-family="Arial" font-size="15" fill="#424242" font-weight="bold">💳 Resumen Pago</text>
        
        <g id="pago-cards">
          <rect x="860" y="245" width="140" height="70" fill="#E3F2FD" rx="6"/>
          <text x="930" y="265" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">TOTAL</text>
          <text x="930" y="295" font-family="Arial" font-size="20" fill="#2196F3" text-anchor="middle" font-weight="bold">300.00</text>
          
          <rect x="1010" y="245" width="140" height="70" fill="#E8F5E9" rx="6"/>
          <text x="1080" y="265" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">ABONO</text>
          <text x="1080" y="295" font-family="Arial" font-size="20" fill="#4CAF50" text-anchor="middle" font-weight="bold">0.00</text>
          
          <rect x="1160" y="245" width="140" height="70" fill="#FFEBEE" rx="6"/>
          <text x="1230" y="265" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">SALDO</text>
          <text x="1230" y="295" font-family="Arial" font-size="20" fill="#d32f2f" text-anchor="middle" font-weight="bold">300.00</text>
        </g>
        
        <!-- Solución Aplicada -->
        <rect x="360" y="360" width="960" height="160" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3" stroke-dasharray="0" rx="8"/>
        <text x="380" y="395" font-family="Arial" font-size="16" fill="#2E7D32" font-weight="bold">✅ Solución Aplicada</text>
        
        <text x="380" y="430" font-family="Arial" font-size="14" fill="#1e3c72" font-weight="bold">Cambio de Pantalla NUEVA</text>
        <text x="380" y="455" font-family="Arial" font-size="11" fill="#666">Técnico: Jesus Lucero</text>
        
        <text x="1200" y="430" font-family="Arial" font-size="11" fill="#666" text-anchor="end">Fecha de Reparación</text>
        <text x="1200" y="455" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="end" font-weight="bold">07/04/2026 12:49</text>
        
        <rect x="380" y="470" width="900" height="30" fill="#C8E6C9" rx="4"/>
        <text x="765" y="492" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="600">💰 Costo de Reparación: $300.00</text>
        
        <!-- Evidencia (Ingreso) y Datos de Entrega en Grid 2 columnas -->
        <g id="grid-evidencia-entrega">
          <!-- Evidencia Ingreso -->
          <rect x="360" y="540" width="450" height="380" fill="white" stroke="#424242" stroke-width="2" rx="8"/>
          <text x="380" y="575" font-family="Arial" font-size="15" fill="#424242" font-weight="bold">📸 Evidencia (Ingreso)</text>
          
          <!-- Fotos de ingreso -->
          <rect x="380" y="595" width="180" height="180" fill="#e0e0e0" rx="8"/>
          <text x="470" y="695" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">Foto 1</text>
          
          <rect x="570" y="595" width="180" height="180" fill="#e0e0e0" rx="8"/>
          <text x="660" y="695" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">Foto 2</text>
          
          <text x="585" y="800" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">🔍 Click para ampliar</text>
          
          <rect x="380" y="820" width="410" height="80" fill="#F5F5F5" rx="6"/>
          <text x="395" y="845" font-family="Arial" font-size="11" fill="#666" font-weight="600">📝 Observaciones:</text>
          <text x="395" y="865" font-family="Arial" font-size="10" fill="#424242">niguna</text>
          
          <!-- Datos de Entrega -->
          <rect x="840" y="540" width="480" height="380" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/>
          <text x="860" y="575" font-family="Arial" font-size="15" fill="#2E7D32" font-weight="bold">📦 Datos de Entrega</text>
          
          <text x="860" y="610" font-family="Arial" font-size="12" fill="#424242" font-weight="600">Recibe: Jesus Fernando</text>
          <text x="860" y="635" font-family="Arial" font-size="12" fill="#424242" font-weight="600">Fecha: 2026-04-07 14:41</text>
          <text x="860" y="660" font-family="Arial" font-size="12" fill="#424242" font-weight="600">Garantía hasta: 07/05/2026</text>
          <text x="860" y="685" font-family="Arial" font-size="12" fill="#424242" font-weight="600">Comprobante: N9991</text>
          
          <!-- Foto de conformidad -->
          <rect x="860" y="710" width="120" height="120" fill="#C8E6C9" rx="8" stroke="#4CAF50" stroke-width="2"/>
          <text x="920" y="775" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="600">Foto de</text>
          <text x="920" y="790" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="600">conformidad</text>
          
          <rect x="1000" y="710" width="300" height="120" fill="#F1F8E9" rx="6"/>
          <text x="1015" y="735" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="600">💰 Pago: $300.00</text>
          <text x="1015" y="760" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="600">💳 Método: Efectivo</text>
          <text x="1015" y="785" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="600">✅ Estado: Funcionando</text>
          <text x="1015" y="810" font-family="Arial" font-size="11" fill="#2E7D32" font-weight="600">    correctamente</text>
        </g>
        
        <!-- Diagnóstico Detallado -->
        <rect x="360" y="940" width="960" height="200" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/>
        <text x="380" y="975" font-family="Arial" font-size="15" fill="#1565C0" font-weight="bold">🔧 Diagnóstico Realizado</text>
        <text x="380" y="1000" font-family="Arial" font-size="12" fill="#666">Técnico Diagnosticador: jesus lucero</text>
        
        <rect x="380" y="1020" width="920" height="100" fill="white" rx="6" stroke="#2196F3" stroke-width="1"/>
        <text x="400" y="1045" font-family="Arial" font-size="13" fill="#1e3c72" font-weight="bold">🐛 Pantalla rota</text>
        <text x="400" y="1070" font-family="Arial" font-size="11" fill="#666">🔧 Solución: Pantalla NUEVA</text>
        
        <text x="1260" y="1060" font-family="Arial" font-size="16" fill="#2196F3" text-anchor="end" font-weight="bold">$300.00</text>
        
        <rect x="380" y="1095" width="920" height="30" fill="#BBDEFB" rx="4"/>
        <text x="1260" y="1117" font-family="Arial" font-size="13" fill="#1565C0" text-anchor="end" font-weight="bold">💰 Costo Total del Diagnóstico: $300.00</text>
        
        <!-- Timeline del Servicio -->
        <rect x="360" y="1160" width="960" height="220" fill="white" stroke="#e0e0e0" stroke-width="2" rx="8"/>
        <text x="380" y="1195" font-family="Arial" font-size="15" fill="#424242" font-weight="bold">📅 Línea de Tiempo del Servicio</text>
        
        <!-- Timeline visual -->
        <line x1="400" y1="1220" x2="400" y2="1350" stroke="#2192B8" stroke-width="3"/>
        
        <!-- Ingreso -->
        <circle cx="400" cy="1220" r="8" fill="#2196F3"/>
        <text x="420" y="1225" font-family="Arial" font-size="11" fill="#424242" font-weight="600">📥 Ingreso: 2026-04-07 12:23</text>
        
        <!-- Diagnóstico -->
        <circle cx="400" cy="1260" r="8" fill="#FF9800"/>
        <text x="420" y="1265" font-family="Arial" font-size="11" fill="#424242" font-weight="600">🔍 Diagnóstico: jesus lucero</text>
        
        <!-- Reparación -->
        <circle cx="400" cy="1300" r="8" fill="#9C27B0"/>
        <text x="420" y="1305" font-family="Arial" font-size="11" fill="#424242" font-weight="600">⚙️ Reparación Completada: 07/04/2026 12:49</text>
        
        <!-- Entrega -->
        <circle cx="400" cy="1340" r="8" fill="#4CAF50"/>
        <text x="420" y="1345" font-family="Arial" font-size="11" fill="#424242" font-weight="600">✅ Entregado: 2026-04-07 14:41</text>
        
        <!-- Calificación del Servicio (NUEVA SECCIÓN) -->
        <rect x="360" y="1400" width="960" height="180" fill="#FFF9C4" stroke="#FBC02D" stroke-width="3" rx="8"/>
        <text x="380" y="1435" font-family="Arial" font-size="16" fill="#F57F17" font-weight="bold">⭐ Calificación del Servicio</text>
        
        <!-- Estrellas de calificación -->
        <g id="rating-stars">
          <text x="500" y="1480" font-family="Arial" font-size="40" fill="#FFD700">★</text>
          <text x="560" y="1480" font-family="Arial" font-size="40" fill="#FFD700">★</text>
          <text x="620" y="1480" font-family="Arial" font-size="40" fill="#FFD700">★</text>
          <text x="680" y="1480" font-family="Arial" font-size="40" fill="#FFD700">★</text>
          <text x="740" y="1480" font-family="Arial" font-size="40" fill="#E0E0E0">★</text>
          
          <text x="820" y="1475" font-family="Arial" font-size="24" fill="#F57F17" font-weight="bold">4.0 / 5.0</text>
        </g>
        
        <!-- Comentario del cliente -->
        <rect x="380" y="1500" width="920" height="60" fill="white" rx="6" stroke="#FBC02D" stroke-width="1"/>
        <text x="400" y="1525" font-family="Arial" font-size="11" fill="#666" font-style="italic">"Excelente servicio, muy rápido y profesional.</text>
        <text x="400" y="1545" font-family="Arial" font-size="11" fill="#666" font-style="italic">El equipo quedó funcionando perfectamente."</text>
        
        <!-- Botón para calificar (si no hay calificación) -->
        <rect x="1050" y="1510" width="230" height="40" fill="#FBC02D" rx="8" filter="url(#buttonShadow)"/>
        <text x="1165" y="1537" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">⭐ Solicitar Calificación</text>
      </g>
    </g>
  </g>
  
  <!-- Ventajas del nuevo diseño -->
  <g id="ventajas">
    <rect x="50" y="1970" width="1300" height="1" fill="#e0e0e0"/>
    
    <text x="700" y="2010" font-family="Arial" font-size="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">✨ VENTAJAS DEL NUEVO DISEÑO</text>
    
    <g id="ventajas-lista">
      <circle cx="100" cy="2050" r="6" fill="#4CAF50"/>
      <text x="120" y="2055" font-family="Arial" font-size="13" fill="#424242">📱 Sidebar fijo con información clave siempre visible</text>
      
      <circle cx="100" cy="2080" r="6" fill="#4CAF50"/>
      <text x="120" y="2085" font-family="Arial" font-size="13" fill="#424242">💰 Resumen financiero destacado en sidebar y contenido</text>
      
      <circle cx="100" cy="2110" r="6" fill="#4CAF50"/>
      <text x="120" y="2115" font-family="Arial" font-size="13" fill="#424242">📊 Layout de 2 columnas: mejor aprovechamiento del espacio</text>
      
      <circle cx="100" cy="2140" r="6" fill="#4CAF50"/>
      <text x="120" y="2145" font-family="Arial" font-size="13" fill="#424242">🎨 Código de colores por sección (problema=naranja, solución=verde, entrega=verde claro)</text>
      
      <circle cx="750" cy="2050" r="6" fill="#4CAF50"/>
      <text x="770" y="2055" font-family="Arial" font-size="13" fill="#424242">📅 Timeline visual del proceso del servicio</text>
      
      <circle cx="750" cy="2080" r="6" fill="#4CAF50"/>
      <text x="770" y="2085" font-family="Arial" font-size="13" fill="#424242">⭐ Nueva sección de calificación del servicio</text>
      
      <circle cx="750" cy="2110" r="6" fill="#4CAF50"/>
      <text x="770" y="2115" font-family="Arial" font-size="13" fill="#424242">📸 Evidencia visual organizada en grid</text>
      
      <circle cx="750" cy="2140" r="6" fill="#4CAF50"/>
      <text x="770" y="2145" font-family="Arial" font-size="13" fill="#424242">🎯 Información jerárquica: lo más importante primero</text>
    </g>
  </g>
  
  <!-- Definiciones -->
  <defs>
    <!-- Gradiente para header -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2192B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra para modal -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Sombra para botones -->
    <filter id="buttonShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
