  <text x="45" y="710" font-family="Arial, sans-serif" font-size="8" fill="#212121">1. El cliente declara ser el propietario legítimo del equipo o tener autorización para su reparación.</text>
  <text x="45" y="723" font-family="Arial, sans-serif" font-size="8" fill="#212121">2. Doctor PC no se hace responsable por la pérdida de datos. Se recomienda realizar respaldo antes del servicio.</text>
  <text x="45" y="736" font-family="Arial, sans-serif" font-size="8" fill="#212121">3. El cliente tiene un plazo máximo de 30 días para recoger su equipo. Después de este período, no hay opción de reclamo.</text>
  <text x="45" y="749" font-family="Arial, sans-serif" font-size="8" fill="#212121">4. Los equipos no recogidos después de 60 días serán considerados abandonados y podrán ser desechados.</text>
  <text x="45" y="762" font-family="Arial, sans-serif" font-size="8" fill="#212121">5. El cliente debe verificar el funcionamiento del equipo al momento de la entrega.</text>
  <text x="45" y="775" font-family="Arial, sans-serif" font-size="8" fill="#212121">6. Para hacer válida la garantía, el cliente debe presentar este documento y el comprobante de pago.</text>
  <text x="45" y="788" font-family="Arial, sans-serif" font-size="8" fill="#212121">7. Doctor PC se reserva el derecho de rechazar servicios de garantía si se detecta manipulación no autorizada.</text>
  <text x="45" y="801" font-family="Arial, sans-serif" font-size="8" fill="#212121">8. Los precios incluyen IGV. Los pagos pueden realizarse en efectivo, tarjeta, Yape o transferencia bancaria.</text>
  <text x="45" y="814" font-family="Arial, sans-serif" font-size="8" fill="#212121">9. Este documento tiene validez legal como comprobante de servicio técnico.</text>
  
