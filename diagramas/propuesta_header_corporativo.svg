<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 100">
  <defs>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo oscuro profesional -->
  <rect width="1400" height="100" fill="url(#darkGradient)"/>
  
  <!-- Línea de acento superior con gradiente -->
  <rect width="1400" height="2" fill="url(#accentLine)"/>
  
  <!-- Patrón geométrico de fondo -->
  <g opacity="0.03">
    <path d="M 0,50 L 100,0 L 200,50 L 100,100 Z" fill="white"/>
    <path d="M 200,50 L 300,0 L 400,50 L 300,100 Z" fill="white"/>
    <path d="M 400,50 L 500,0 L 600,50 L 500,100 Z" fill="white"/>
  </g>
  
  <!-- Logo y marca corporativa -->
  <g transform="translate(40, 25)">
    <!-- Logo hexagonal moderno -->
    <g filter="url(#glow)">
      <path d="M 25,5 L 40,15 L 40,35 L 25,45 L 10,35 L 10,15 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <path d="M 25,12 L 35,18 L 35,32 L 25,38 L 15,32 L 15,18 Z" fill="#00d4ff" opacity="0.3"/>
      <text x="25" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">PC</text>
    </g>
  </g>
  
  <!-- Marca y título -->
  <g transform="translate(95, 25)">
    <text x="0" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="white" letter-spacing="0.5">
      DOCTOR PC
    </text>
    <text x="0" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00d4ff" letter-spacing="1">
      SISTEMA DE ADMINISTRACIÓN
    </text>
    <line x1="0" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Separador vertical elegante -->
  <g transform="translate(380, 20)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="white" stroke-width="1" opacity="0.1"/>
    <line x1="1" y1="0" x2="1" y2="60" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Módulo actual con indicador -->
  <g transform="translate(420, 35)">
    <rect x="0" y="0" width="4" height="30" rx="2" fill="#00d4ff"/>
    <text x="15" y="13" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500" fill="white" opacity="0.6">
      MÓDULO ACTUAL
    </text>
    <text x="15" y="27" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="white">
      Gestión de Usuarios
    </text>
  </g>
  
  <!-- Estadísticas rápidas -->
  <g transform="translate(680, 30)">
    <!-- Stat 1 -->
    <g>
      <rect x="0" y="0" width="100" height="40" rx="4" fill="white" opacity="0.05"/>
      <text x="10" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" opacity="0.6">
        SERVICIOS HOY
      </text>
      <text x="10" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#00d4ff">
        24
      </text>
    </g>
    
    <!-- Stat 2 -->
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="100" height="40" rx="4" fill="white" opacity="0.05"/>
      <text x="10" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" opacity="0.6">
        PENDIENTES
      </text>
      <text x="10" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#ffa500">
        8
      </text>
    </g>
    
    <!-- Stat 3 -->
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="100" height="40" rx="4" fill="white" opacity="0.05"/>
      <text x="10" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" opacity="0.6">
        COMPLETADOS
      </text>
      <text x="10" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#00ff88">
        16
      </text>
    </g>
  </g>
  
  <!-- Panel de usuario y controles -->
  <g transform="translate(1100, 30)">
    <!-- Hora actual -->
    <g>
      <text x="0" y="12" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" opacity="0.5">
        10 ABR 2026
      </text>
      <text x="0" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="white">
        14:35 PM
      </text>
    </g>
    
    <!-- Notificaciones -->
    <g transform="translate(110, 0)">
      <circle cx="20" cy="20" r="20" fill="white" opacity="0.08"/>
      <path d="M 14,14 L 14,18 C 14,21 16,22 20,22 C 24,22 26,21 26,18 L 26,14 C 26,12 24,11 20,11 C 16,11 14,12 14,14 Z" fill="white"/>
      <path d="M 18,23 Q 20,25 22,23" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Badge con glow -->
      <circle cx="30" cy="12" r="6" fill="#ff4757" filter="url(#glow)"/>
      <text x="30" y="15" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">7</text>
    </g>
    
    <!-- Usuario -->
    <g transform="translate(165, 0)">
      <circle cx="20" cy="20" r="20" fill="#00d4ff" opacity="0.2"/>
      <circle cx="20" cy="20" r="18" fill="url(#accentLine)"/>
      <text x="20" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">
        AD
      </text>
      <!-- Status indicator -->
      <circle cx="32" cy="30" r="4" fill="#00ff88" stroke="#16213e" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Línea inferior con efecto de profundidad -->
  <rect y="98" width="1400" height="2" fill="black" opacity="0.3"/>
</svg>