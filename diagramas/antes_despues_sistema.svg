<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600">
  <defs>
    <style>
      .title { font: bold 26px sans-serif; fill: #1a1a1a; }
      .section-title { font: bold 20px sans-serif; fill: white; }
      .text { font: 14px sans-serif; fill: #2c3e50; }
      .problem { fill: #e74c3c; }
      .solution { fill: #27ae60; }
      .icon { font: 40px sans-serif; }
    </style>
  </defs>

  <!-- Título principal -->
  <text x="700" y="45" text-anchor="middle" class="title">EVOLUCIÓN DEL SISTEMA DE PAGOS</text>

  <!-- ANTES -->
  <g id="antes">
    <rect x="50" y="80" width="600" height="480" rx="15" class="problem" opacity="0.15"/>
    <rect x="50" y="80" width="600" height="60" rx="15" class="problem"/>
    <text x="350" y="118" text-anchor="middle" class="section-title">❌ ANTES - Sistema Limitado</text>

    <!-- Problema 1 -->
    <rect x="80" y="170" width="540" height="80" rx="8" fill="white" stroke="#e74c3c" stroke-width="2"/>
    <text x="100" y="195" class="text" font-weight="bold">❌ Sin trazabilidad de pagos</text>
    <text x="110" y="220" class="text">• Solo se guardaba el monto total pagado</text>
    <text x="110" y="240" class="text">• No se registraba fecha exacta de cada pago</text>

    <!-- Problema 2 -->
    <rect x="80" y="270" width="540" height="80" rx="8" fill="white" stroke="#e74c3c" stroke-width="2"/>
    <text x="100" y="295" class="text" font-weight="bold">❌ Falta de información detallada</text>
    <text x="110" y="320" class="text">• No se guardaba método de pago (efectivo, yape, etc.)</text>
    <text x="110" y="340" class="text">• No había referencias bancarias para auditoría</text>

    <!-- Problema 3 -->
    <rect x="80" y="370" width="540" height="80" rx="8" fill="white" stroke="#e74c3c" stroke-width="2"/>
    <text x="100" y="395" class="text" font-weight="bold">❌ Imposibilidad de reportes</text>
    <text x="110" y="420" class="text">• No se podía generar historial de pagos por servicio</text>
    <text x="110" y="440" class="text">• Difícil hacer análisis financiero o auditorías</text>

    <!-- Problema 4 -->
    <rect x="80" y="470" width="540" height="70" rx="8" fill="white" stroke="#e74c3c" stroke-width="2"/>
    <text x="100" y="495" class="text" font-weight="bold">❌ Sin control de usuarios</text>
    <text x="110" y="520" class="text">• No se registraba quién recibió cada pago</text>
  </g>

  <!-- Flecha de transformación -->
  <g id="arrow">
    <defs>
      <marker id="big-arrow" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto">
        <polygon points="0 0, 20 10, 0 20" fill="#f39c12" />
      </marker>
    </defs>
    <line x1="670" y1="320" x2="730" y2="320" stroke="#f39c12" stroke-width="8" marker-end="url(#big-arrow)"/>
    <text x="700" y="310" text-anchor="middle" class="text" font-weight="bold" fill="#f39c12">MEJORA</text>
  </g>

  <!-- DESPUÉS -->
  <g id="despues">
    <rect x="750" y="80" width="600" height="480" rx="15" class="solution" opacity="0.15"/>
    <rect x="750" y="80" width="600" height="60" rx="15" class="solution"/>
    <text x="1050" y="118" text-anchor="middle" class="section-title">✅ DESPUÉS - Sistema Completo</text>

    <!-- Solución 1 -->
    <rect x="780" y="170" width="540" height="80" rx="8" fill="white" stroke="#27ae60" stroke-width="2"/>
    <text x="800" y="195" class="text" font-weight="bold" fill="#27ae60">✅ Trazabilidad total</text>
    <text x="810" y="220" class="text">• Cada pago registrado individualmente</text>
    <text x="810" y="240" class="text">• Fecha y hora exacta de cada transacción</text>

    <!-- Solución 2 -->
    <rect x="780" y="270" width="540" height="80" rx="8" fill="white" stroke="#27ae60" stroke-width="2"/>
    <text x="800" y="295" class="text" font-weight="bold" fill="#27ae60">✅ Información completa</text>
    <text x="810" y="320" class="text">• Método de pago registrado (efectivo, yape, transferencia)</text>
    <text x="810" y="340" class="text">• Referencias bancarias para conciliación</text>

    <!-- Solución 3 -->
    <rect x="780" y="370" width="540" height="80" rx="8" fill="white" stroke="#27ae60" stroke-width="2"/>
    <text x="800" y="395" class="text" font-weight="bold" fill="#27ae60">✅ Reportes y análisis</text>
    <text x="810" y="420" class="text">• Historial completo por servicio o cliente</text>
    <text x="810" y="440" class="text">• Análisis financiero y auditorías facilitadas</text>

    <!-- Solución 4 -->
    <rect x="780" y="470" width="540" height="70" rx="8" fill="white" stroke="#27ae60" stroke-width="2"/>
    <text x="800" y="495" class="text" font-weight="bold" fill="#27ae60">✅ Control de usuarios</text>
    <text x="810" y="520" class="text">• Registro de quién recibió cada pago</text>
  </g>

  <!-- Resultado -->
  <rect x="50" y="570" width="1300" height="25" rx="5" fill="#3498db"/>
  <text x="700" y="588" text-anchor="middle" class="section-title" font-size="16">
    🎯 IMPACTO: Control financiero preciso + Transparencia total + Auditoría completa
  </text>
</svg>
