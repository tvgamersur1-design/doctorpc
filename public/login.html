<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Doctor PC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            padding: 40px 36px;
            text-align: center;
        }

        .login-logo {
            width: 140px;
            margin-bottom: 24px;
        }

        .login-card h2 {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid #dce1e8;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #2c3e50;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #2192B8;
            box-shadow: 0 0 0 3px rgba(33, 146, 184, 0.15);
        }

        .input-wrapper input::placeholder {
            color: #b0b8c1;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #95a5a6;
            cursor: pointer;
            font-size: 15px;
            padding: 0;
        }

        .toggle-password:hover {
            color: #2192B8;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            display: none;
            text-align: left;
            border: 1px solid #fecaca;
        }

        .error-message.visible {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-direction: column;
        }

        .error-message .error-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .intentos-bar-wrap {
            width: 100%;
            margin-top: 8px;
        }

        .intentos-label {
            font-size: 12px;
            color: #b91c1c;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .intentos-bar {
            width: 100%;
            height: 6px;
            background: #fecaca;
            border-radius: 99px;
            overflow: hidden;
        }

        .intentos-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .intentos-bloqueado {
            background: #fef2f2;
            color: #7f1d1d;
            font-size: 13px;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            display: none;
            border: 1px solid #fca5a5;
            text-align: center;
        }

        .intentos-bloqueado.visible {
            display: block;
        }

        .intentos-bloqueado strong {
            display: block;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #2192B8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: #1a7a9e;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            background: #7cc0d4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="images/logo-doctorpc.png" alt="Doctor PC" class="login-logo">
            <h2>Iniciar Sesión</h2>
            <p class="login-subtitle">Sistema de Administración</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="clave">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="clave" name="clave" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="error-message" id="errorMessage">
                    <div class="error-main">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="errorText"></span>
                    </div>
                    <div class="intentos-bar-wrap" id="intentosWrap" style="display:none">
                        <div class="intentos-label" id="intentosLabel"></div>
                        <div class="intentos-bar">
                            <div class="intentos-bar-fill" id="intentosBarFill"></div>
                        </div>
                    </div>
                </div>
                <div class="intentos-bloqueado" id="bloqueadoMessage">
                    <strong><i class="fas fa-lock"></i> Acceso bloqueado temporalmente</strong>
                    <span id="bloqueadoText"></span>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="spinner"></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const bloqueadoMessage = document.getElementById('bloqueadoMessage');
        const bloqueadoText = document.getElementById('bloqueadoText');
        const intentosWrap = document.getElementById('intentosWrap');
        const intentosLabel = document.getElementById('intentosLabel');
        const intentosBarFill = document.getElementById('intentosBarFill');
        const toggleBtn = document.querySelector('.toggle-password');
        const claveInput = document.getElementById('clave');

        const LIMITE_INTENTOS = 10;
        const UMBRAL_AVISO = 5; // mostrar barra cuando queden 5 o menos

        toggleBtn.addEventListener('click', function () {
            const isPassword = claveInput.type === 'password';
            claveInput.type = isPassword ? 'text' : 'password';
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        function showError(message, intentosRestantes) {
            // Ocultar bloqueo si estaba visible
            bloqueadoMessage.classList.remove('visible');

            errorText.textContent = message;
            errorMessage.classList.add('visible');

            // Mostrar barra solo si quedan 5 o menos intentos
            if (intentosRestantes !== undefined && intentosRestantes <= UMBRAL_AVISO) {
                const porcentaje = (intentosRestantes / LIMITE_INTENTOS) * 100;

                // Color según urgencia
                let color;
                if (intentosRestantes <= 1) color = '#dc2626';       // rojo fuerte
                else if (intentosRestantes <= 3) color = '#ea580c';   // naranja
                else color = '#f59e0b';                               // amarillo

                intentosLabel.innerHTML = intentosRestantes === 1
                    ? '<i class="fas fa-exclamation-triangle"></i> ¡Último intento antes de bloqueo!'
                    : `<i class="fas fa-exclamation-triangle"></i> Te quedan ${intentosRestantes} intento${intentosRestantes > 1 ? 's' : ''}`;

                intentosBarFill.style.width = porcentaje + '%';
                intentosBarFill.style.background = color;
                intentosWrap.style.display = 'block';
            } else {
                intentosWrap.style.display = 'none';
            }
        }

        function showBloqueado(disponibleALas) {
            errorMessage.classList.remove('visible');
            intentosWrap.style.display = 'none';
            bloqueadoText.textContent = disponibleALas
                ? `Demasiados intentos fallidos. Podrás intentarlo de nuevo a las ${disponibleALas}.`
                : 'Demasiados intentos fallidos. Intenta de nuevo en 15 minutos.';
            bloqueadoMessage.classList.add('visible');
            btnLogin.disabled = true;
        }

        function hideError() {
            errorMessage.classList.remove('visible');
            bloqueadoMessage.classList.remove('visible');
            intentosWrap.style.display = 'none';
        }

        function setLoading(loading) {
            btnLogin.disabled = loading;
            btnLogin.classList.toggle('loading', loading);
        }

        const isLocal = window.location.hostname === 'localhost';
        const API_BASE = isLocal ? 'http://localhost:3000' : window.location.origin;

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            const usuario = document.getElementById('usuario').value.trim();
            const clave = document.getElementById('clave').value;

            if (!usuario || !clave) {
                showError('Por favor complete todos los campos.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, clave })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    window.location.href = 'index.html';
                } else if (response.status === 429) {
                    // Bloqueado por rate limit
                    showBloqueado(data.disponible_a_las);
                } else {
                    showError(
                        data.error || 'Credenciales incorrectas.',
                        data.intentos_restantes
                    );
                }
            } catch (err) {
                showError('Error de conexión. Intente nuevamente.');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
